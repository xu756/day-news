name: Daily AI Digest

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      DIGEST_ENABLE_COVER_MODEL: ${{ secrets.DIGEST_ENABLE_COVER_MODEL }}
      DIGEST_COVER_MODEL: ${{ secrets.DIGEST_COVER_MODEL }}
      DIGEST_TIMEZONE: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate digest MDX
        run: bun run digest:generate

      - name: Commit digest changes
        run: |
          if [[ -n "$(git status --porcelain -- content/digest public/images/digest 2>/dev/null)" ]]; then
            TODAY="$(TZ=Asia/Shanghai date +%F)"
            git config user.name "digest-bot"
            git config user.email "digest-bot@users.noreply.github.com"
            git add content/digest public/images/digest || true
            git commit -m "chore(digest): ${TODAY}" || true
            git push
          else
            echo "No digest content changes"
          fi

      - name: Build frontend
        run: bun run build

      - name: Build docker image
        run: |
          if [[ -f Dockerfile ]]; then
            docker build -t day-news:digest-ci .
          else
            echo "Dockerfile not found, skipping docker build"
          fi
